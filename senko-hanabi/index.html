<script>

"use strict";
function isMobileDevice(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
    (navigator.maxTouchPoints > 0 && matchMedia("(pointer:coarse)").matches);
}
let __errLog = [];
function flagErrorButton(){
  const btn = document.getElementById("logToggle");
  if (btn){ btn.style.borderColor = "rgba(255,90,90,.9)"; btn.style.color = "rgba(255,150,150,.9)"; btn.textContent = "ログ⚠"; }
}
window.addEventListener("error", e => {
  __errLog.push((e.message||"") + " @ " + (e.filename||"") + ":" + (e.lineno||""));
  const el = document.getElementById("debug");
  if (el) el.textContent = "★エラー発生★\n" + __errLog.slice(-5).join("\n") + "\n\n" + el.textContent;
  flagErrorButton();
});
window.addEventListener("unhandledrejection", e => {
  __errLog.push("Promise rejected: " + (e.reason && e.reason.message || e.reason));
  const el = document.getElementById("debug");
  if (el) el.textContent = "★エラー発生★\n" + __errLog.slice(-5).join("\n") + "\n\n" + el.textContent;
  flagErrorButton();

const rand = (a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const TAU = Math.PI*2;

const Sound = {
  ctx:null, master:null, sizzleGain:null, noiseBuf:null,
  init(){
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.9;
    this.master.connect(this.ctx.destination);

    const len = this.ctx.sampleRate * 2;
    this.noiseBuf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = this.noiseBuf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = Math.random()*2-1;

    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf; src.loop = true;
    const lp = this.ctx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 2600; lp.Q.value = 0.4;
    this.sizzleGain = this.ctx.createGain();
    this.sizzleGain.gain.value = 0;
    src.connect(lp).connect(this.sizzleGain).connect(this.master);
    src.start();
  },
  resume(){ if (this.ctx && this.ctx.state === "suspended") this.ctx.resume(); },
  sizzle(v){
    if (!this.ctx) return;
    this.sizzleGain.gain.setTargetAtTime(v * 0.05, this.ctx.currentTime, 0.12);
  },
  crackle(big){
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const s = this.ctx.createBufferSource();
    s.buffer = this.noiseBuf;
    s.playbackRate.value = rand(0.8, 1.6);
    const bp = this.ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = big ? rand(1200,2600) : rand(2400,7000);
    bp.Q.value = rand(1.5, 4);
    const g = this.ctx.createGain();
    const peak = big ? rand(0.25,0.45) : rand(0.04,0.14);
    const dur = big ? rand(0.03,0.06) : rand(0.008,0.025);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(peak, t + 0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    s.connect(bp).connect(g).connect(this.master);
    s.start(t, rand(0, 1.5), dur + 0.02);
  },
  thud(){
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    o.type = "sine";
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(50, t + 0.18);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g).connect(this.master);
    o.start(t); o.stop(t + 0.25);
    this.sizzle(0);
  },
  ignite(){
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const s = this.ctx.createBufferSource();
    s.buffer = this.noiseBuf;
    const bp = this.ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.setValueAtTime(500, t);
    bp.frequency.exponentialRampToValueAtTime(3200, t + 0.22);
    bp.Q.value = 1.1;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
    s.connect(bp).connect(g).connect(this.master);
    s.start(t, 0, 0.4);
  },
  footsteps(n){
    if (!this.ctx) return;
    for (let i=0;i<n;i++){
      const t = this.ctx.currentTime + i*0.09;
      const o = this.ctx.createOscillator();
      o.type = "square";
      o.frequency.setValueAtTime(rand(180,260), t);
      o.frequency.exponentialRampToValueAtTime(90, t+0.06);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0.09, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.08);
      o.connect(g).connect(this.master);
      o.start(t); o.stop(t+0.1);
    }
  }
};

const Hand = {
  instability: 0,
  tiltMag: 0, pinchRisk: 0, pinchRiskCam: 0, pointerShake: 0,
  baseBeta: null, baseGamma: null, gamma: 0,
  gyroState: "未要求", gyroEvents: 0, lastBeta: 0, lastGamma: 0,

  touches: new Map(),
  initGap: null,
  pinchCenter: {x:0,y:0},
  smoothCenter: {x:0,y:0},

  camReady: false, camModelReady: false, camState: "未使用", camFingers: null, lowLightSuspected: false, avgLuma: 255,

  enableTilt(){
    const h = e => {
      this.gyroEvents++;
      this.lastBeta = e.beta; this.lastGamma = e.gamma;
      if (e.beta == null){ this.gyroState = "イベントは来るが値がnull"; return; }
      this.gyroState = "生きてる";
      if (this.baseBeta === null){ this.baseBeta = e.beta; this.baseGamma = e.gamma; }
      const db = (e.beta - this.baseBeta), dg = (e.gamma - this.baseGamma);
      this.gamma = clamp(dg / 45, -1, 1);
      const deg = Math.hypot(db, dg);
      this.tiltMag = clamp((deg - 8) / 17, 0, 1);
    };
    const DOE = window.DeviceOrientationEvent;
    if (DOE && typeof DOE.requestPermission === "function"){
      this.gyroState = "許可を要求中…";
      DOE.requestPermission().then(s => {
        this.gyroState = "許可:" + s;
        if (s === "granted") window.addEventListener("deviceorientation", h);
      }).catch(err => { this.gyroState = "要求が拒否された(" + (err && err.name || "?") + ")"; });
    } else if (DOE){
      this.gyroState = "許可不要・待機中";
      window.addEventListener("deviceorientation", h);
    } else {
      this.gyroState = "APIなし";
    }
  },

  stream: null, videoDeviceId: null,

  async populateCamList(){
    try{
      const sel = document.getElementById("camSelect");
      if (isMobileDevice()){ sel.style.display = "none"; return; }
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === "videoinput");
      if (cams.length < 2){ sel.style.display = "none"; return; }
      sel.innerHTML = "";
      cams.forEach((d, i) => {
        const opt = document.createElement("option");
        opt.value = d.deviceId;
        opt.textContent = d.label || ("カメラ " + (i+1));
        if (d.deviceId === this.videoDeviceId) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.style.display = "block";
      if (!sel.dataset.bound){
        sel.dataset.bound = "1";
        sel.addEventListener("change", () => this.switchCam(sel.value));
      }
    }catch(e){}
  },

  async switchCam(deviceId){
    try{
      this.camState = "カメラを切り替え中…";
      if (this.stream) this.stream.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ deviceId:{exact:deviceId}, width:{ideal:176}, height:{ideal:132} }, audio:false
      });
      this.videoDeviceId = deviceId;
      this.stream = stream;
      const video = document.getElementById("cam");
      video.srcObject = stream;
      await video.play();
      this.camState = "検知中";
      this.populateCamList();
      this.tryBoostExposure(stream);
    }catch(e){
      this.camState = "カメラ切替に失敗";
    }
  },

  // 2026-07: track.applyConstraints()によるネイティブ露出制御を撤廃。
  // MediaTek系チップ（OPPO Reno 10x等）のカメラHALでは、起動直後や検知中に
  // applyConstraintsを呼ぶだけでカメラパイプラインが応答しなくなり、
  // 「サイト権限は許可済みなのに映像が来ない」症状を引き起こすことが確認できたため。
  // 暗所対応はネイティブ設定に触れないピクセル処理側（applyLowLightBoost）だけで行う。
  async tryBoostExposure(stream){},
  async nudgeExposureForLowLight(isDark){},

  // 一部端末（OPPO/ColorOS系など）は極小解像度のideal指定や短い待ち時間の連続要求で
  // getUserMediaがOverconstrainedError/NotReadableErrorを返し、サイト権限は許可済みなのに
  // 映像が来ないまま失敗することがある。制約を段階的に緩めながら複数回試す。
  async requestCamStream(){
    const attempts = [
      { video:{ facingMode:"user", width:{ideal:176}, height:{ideal:132} }, audio:false },
      { video:{ facingMode:"user" }, audio:false },
      { video:true, audio:false },
    ];
    let lastErr = null;
    for (let i=0;i<attempts.length;i++){
      try{
        return await navigator.mediaDevices.getUserMedia(attempts[i]);
      }catch(e){
        lastErr = e;
        // カメラハードウェアが直前の解放処理中などで一時的にビジーな場合があるため、

      const prepTicker = setInterval(() => {
        if (!this.camState.startsWith("手の検知モデルを準備中")){ clearInterval(prepTicker); return; }

      // ctx.filter(CSS filter)はiOS Safariで無視されることがあるため、手動のピクセル処理で代替する。
      const applyLowLightBoost = () => {
        const w = procCanvas.width, h = procCanvas.height;
        const img = procCtx.getImageData(0, 0, w, h);
        const d = img.data;
        let sum = 0, lo = 255, hi = 0;
        const step = 4 * 3;
        for (let i = 0; i < d.length; i += step){

  if (camPts) return { x:(camPts[0].x+camPts[1].x)/2, y:(camPts[0].y+camPts[1].y)/2 };
  if (Hand.touches.size >= 2){
    const pts=[...Hand.touches.values()];

    life:rand(phase.life[0],phase.life[1])*(gen?0.6:1)*Math.min(b,1.4),
    age:0, gen, maxGen:phase.branch,

    if (!s.split && s.gen<s.maxGen && s.age/s.life>s.splitAt){
      s.split=true;
      const n = 2+(Math.random()<0.5?1:0)+(s.gen===0&&Math.random()<0.3?1:0);
      for (let k=0;k<n;k++){
        if (sparks.length>=MAX_SPARKS) break;
        sparks.push({
          x:s.x,y:s.y,px:s.x,py:s.y,
          vx:s.vx*0.45+rand(-140,140), vy:s.vy*0.45+rand(-140,140),
          life:s.life*rand(0.35,0.55), age:0, gen:s.gen+1, maxGen:s.maxGen,
          splitAt:rand(0.4,0.7), split:false, w:rand(.4,.8),

let anchorSmooth2=null;
function anchor2(){
  const touchesArr=[...Hand.touches.values()];
  const target = touchesArr.length>=4 ? {x:(touchesArr[2].x+touchesArr[3].x)/2, y:(touchesArr[2].y+touchesArr[3].y)/2} : null;
  const fallback = { x: W/2, y: Math.min(H*0.22, 140) };
  const t = target || fallback;
  if (!anchorSmooth2) anchorSmooth2 = { x:t.x, y:t.y };
  anchorSmooth2.x += (t.x - anchorSmooth2.x) * 0.18;
  anchorSmooth2.y += (t.y - anchorSmooth2.y) * 0.18;
  return anchorSmooth2;
}
let flexT2=null, flexPos2=null, flexVel2={x:0,y:0}, flexBendX2=0, flexBendY2=0;
function ballPos2(t){
  const a=anchor2(), L=koyoriLen();
  const slow = Math.sin(t*0.72+0.6)*0.035 + Math.sin(t*0.25+2.1)*0.02;
  const jit = (Math.sin(t*13.9+1)+Math.sin(t*8.5+3))*0.004;
  const shake = Hand.instability * Math.sin(t*17+1) * 0.09;
  const ang = slow + jit - Hand.gamma*0.14 + wind.x/9000 + shake;
  const ideal = { x:a.x+Math.sin(ang)*L, y:a.y+Math.cos(ang)*L };
  if (flexT2===null || flexPos2===null){
    flexT2=t; flexPos2={x:ideal.x,y:ideal.y}; flexBendX2=0; flexBendY2=0;
    return {x:ideal.x,y:ideal.y};
  }
  const dt = clamp(t-flexT2, 0, 0.05); flexT2 = t;
  const k = 300 - Hand.instability*220, c = 20;
  const ax = (ideal.x-flexPos2.x)*k - flexVel2.x*c, ay = (ideal.y-flexPos2.y)*k - flexVel2.y*c;
  flexVel2.x += ax*dt; flexVel2.y += ay*dt;
  flexPos2.x += flexVel2.x*dt; flexPos2.y += flexVel2.y*dt;
  flexBendX2 = flexPos2.x - ideal.x; flexBendY2 = flexPos2.y - ideal.y;
  return {x:flexPos2.x, y:flexPos2.y};
}

function drawFingerShape(bx,by,tx,ty,baseW,tipW,color){
  const dx=tx-bx, dy=ty-by;
  const len=Math.hypot(dx,dy)||1;
  const nx=-dy/len, ny=dx/len;
  const midx=(bx+tx)/2 + nx*len*0.06, midy=(by+ty)/2 + ny*len*0.06;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(bx+nx*baseW, by+ny*baseW);
  ctx.quadraticCurveTo(midx+nx*(baseW+tipW)/2, midy+ny*(baseW+tipW)/2, tx+nx*tipW, ty+ny*tipW);
  ctx.arc(tx, ty, tipW, Math.atan2(ny,nx), Math.atan2(-ny,-nx), false);
  ctx.quadraticCurveTo(midx-nx*(baseW+tipW)/2, midy-ny*(baseW+tipW)/2, bx-nx*baseW, by-ny*baseW);
  ctx.closePath();
  ctx.fill();
}

function drawHandInk(dim){
  const a = anchor();
  const gripPoint = { x: a.x, y: Math.max(a.y, 26) };

  const camPts = (Hand.camReady && Hand.camFingers) ? Hand.camFingers : null;
  const touchHolding = Hand.touches.size >= 2;
  const holding = !!camPts || touchHolding;
  const alpha = holding ? (0.72 - Hand.pinchRisk*0.32) : 0.16;
  const tremor = Hand.instability * 3;

  ctx.globalCompositeOperation = "source-over";

  const pts = camPts ? camPts
            : touchHolding ? [...Hand.touches.values()].slice(0,2)
            : [{x:a.x-70,y:H*0.7},{x:a.x+70,y:H*0.7}];

  const palmY = Math.max(...pts.map(p=>p.y), gripPoint.y) + 46;
  const palmX = (pts[0].x + pts[1].x) / 2;
  ctx.fillStyle = `rgba(20,14,20,${alpha*0.5})`;
  ctx.beginPath(); ctx.ellipse(palmX, palmY, 30, 24, 0, 0, TAU); ctx.fill();

  const color = `rgba(20,14,20,${alpha})`;
  const tips = [];
  for (const p of pts){
    const jx = (Math.random()-0.5)*tremor, jy = (Math.random()-0.5)*tremor;
    const tip = {x:p.x+jx, y:p.y+jy};
    tips.push(tip);
    drawFingerShape(palmX, palmY, tip.x, tip.y, 9, 3.4, color);
  }

  if (holding){
    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = `rgba(255,180,110,${0.25*dim})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(tips[0].x,tips[0].y); ctx.lineTo(tips[1].x,tips[1].y); ctx.stroke();
    ctx.setLineDash([]);
    for (const tip of tips){
      let g = ctx.createRadialGradient(tip.x,tip.y,0,tip.x,tip.y,11);
      g.addColorStop(0, `rgba(255,195,130,${0.5*dim})`);
      g.addColorStop(1, "rgba(255,195,130,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(tip.x,tip.y,11,0,TAU); ctx.fill();
      ctx.fillStyle = `rgba(255,235,210,${0.65*dim})`;
      ctx.beginPath(); ctx.arc(tip.x,tip.y,2,0,TAU); ctx.fill();
    }
    ctx.globalCompositeOperation = "source-over";
  }
}

function phaseAt(t){
  let acc=0;
  for (const p of PHASES){
    if (t<acc+p.dur) return {p, local:(t-acc)/p.dur};
    acc+=p.dur;
  }
  return null;
}

function makeDropBall(x,y,cause){

    ? {x,y,vx:0,vy:0,r:1,fading:true,fadeT:0}

}
function stepDropBall(ball,dt,t){
  if (!ball) return;
  if (ball.fading){
    ball.fadeT += dt;
    const p = clamp(ball.fadeT/1.4, 0, 1);
    ball.r = 1-p;
    drawBall(ball.x,ball.y,t,0.5+0.4*(1-p),1-p);
  } else {
    ball.vy += 520*dt;
    ball.x += ball.vx*dt;
    ball.y += ball.vy*dt;
    ball.r *= Math.pow(0.5,dt);
    const ground = H*0.86;
    if (ball.y>ground){ ball.y=ground; ball.r*=0.6; ball.vy=0; }
    drawBall(ball.x,ball.y,t,0.5*ball.r,ball.r);
  }
}

function wrapFillText(g, text, cx, cy, maxWidth, lineHeight){
  const words = text.split("");
  let lines = [], line = "";
  for (const ch of words){
    const test = line + ch;
    if (g.measureText(test).width > maxWidth && line){
      lines.push(line); line = ch;
    } else line = test;
  }
  if (line) lines.push(line);
  lines = lines.slice(0, 3);
  const startY = cy - (lines.length-1)*lineHeight/2;
  lines.forEach((l,i) => g.fillText(l, cx, startY + i*lineHeight));
}

function buildShareImage(seconds, cause, count, customText){

  out.toBlob(blob => {

async function nativeShare(){
  if (!window.__shareBlob){ achToast("画像を準備中です。少し待ってからもう一度お試しください"); return; }
  const file = new File([window.__shareBlob], funFileName(), { type:"image/png" });
  const seconds = document.getElementById("finalTime").textContent;
  const link = batonUrl(seconds);

  // canShareが例外を投げる実装があるため必ずtry/catchで判定する
  let canShareFiles = false;
  try{ canShareFiles = !!(navigator.canShare && navigator.canShare({ files:[file] })); }catch(e){}

  if (canShareFiles){
    try{
      await navigator.share({ files:[file], title:"線香花火", text:"線香花火、" + seconds + "秒。次はキミの番。\n" + link });
    }catch(e){
      if (e && e.name === "AbortError") return; // ユーザーがシェアをキャンセルしただけ
      // 画像付き共有に失敗した端末向けに、確実に画像だけは残す
      saveShareImage();
      achToast("この端末では画像を直接シェアできなかったため、画像を保存しました");
    }
    return;
  }

  // 画像添付共有に対応していない端末: 画像は保存し、リンク共有は文言で案内する

  achToast("画像を保存しました。シェア先に画像を添付してください");

    try{ await navigator.share({ title:"線香花火", text:"線香花火、" + seconds + "秒。次はキミの番。", url:link }); }
    catch(e){}
  }
}

function getUnlitTipPos(){

function drawUnlitSparkler(dim){
  const a = anchor();
  const tip = getUnlitTipPos();
  ctx.globalCompositeOperation = "source-over";
  // 区切ったストロークを継ぎ足すと縁が段差になって「四角の連なり」に見えるため、
  // 密にサンプリングした1本のリボン形状として塗りつぶし、ねじれは表面の陰影線で表現する。
  const N = 48;
  const twistOf = t => Math.sin(t*Math.PI*9)*2.1 + Math.sin(t*Math.PI*3.3+1.2)*0.9;
  const halfWOf = t => 1.55 + Math.sin(t*Math.PI*9+0.6)*0.35 + (1-t)*0.35; // 根元がわずかに太い
  const pts = [];
  for (let i=0;i<=N;i++){
    const t = i/N;
    const cx = a.x + (tip.x-a.x)*t + twistOf(t);
    const cy = a.y + (tip.y-a.y)*t;
    pts.push({ x:cx, y:cy, hw:halfWOf(t), t });
  }

  ctx.beginPath();
  ctx.moveTo(pts[0].x-pts[0].hw, pts[0].y);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x-pts[i].hw, pts[i].y);
  for (let i=pts.length-1;i>=0;i--) ctx.lineTo(pts[i].x+pts[i].hw, pts[i].y);
  ctx.closePath();

  const bodyGrad = ctx.createLinearGradient(a.x,a.y,tip.x,tip.y);
  bodyGrad.addColorStop(0,    `rgba(214,168,120,${0.94*dim})`);
  bodyGrad.addColorStop(0.5,  `rgba(226,150,128,${0.94*dim})`);
  bodyGrad.addColorStop(1,    `rgba(150,72,86,${0.94*dim})`);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // 左右のエッジをわずかに暗くして円筒感（紙が巻かれている厚み）を出す
  ctx.save();
  ctx.clip();
  ctx.strokeStyle = `rgba(70,35,40,${0.35*dim})`;
  ctx.lineWidth = 0.9;
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x-p.hw,p.y) : ctx.lineTo(p.x-p.hw,p.y));
  ctx.stroke();
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x+p.hw,p.y) : ctx.lineTo(p.x+p.hw,p.y));
  ctx.stroke();

  // ねじれた紙の継ぎ目を、太さの中で滑らかに蛇行する陰影線で表現する（角ばった段差にしない）
  ctx.strokeStyle = `rgba(90,40,45,${0.4*dim})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  pts.forEach((p,i) => {
    const wob = p.hw * Math.sin(p.t*Math.PI*9);
    i===0 ? ctx.moveTo(p.x+wob*0.5,p.y) : ctx.lineTo(p.x+wob*0.5,p.y);
  });
  ctx.stroke();

  ctx.strokeStyle = `rgba(255,244,225,${0.32*dim})`;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  pts.forEach((p,i) => {
    const wob = p.hw * Math.sin(p.t*Math.PI*9 + Math.PI);
    i===0 ? ctx.moveTo(p.x+wob*0.5,p.y) : ctx.lineTo(p.x+wob*0.5,p.y);
  });
  ctx.stroke();
  ctx.restore();

  // 先端の火薬玉：均一な灰色球ではなく、ざらついた粒状の質感と鈍い照り返しを持たせる
  const tr = 4.6;
  let pg = ctx.createRadialGradient(tip.x-1.3,tip.y-1.3,0.4, tip.x,tip.y,tr);
  pg.addColorStop(0, `rgba(168,150,140,${0.95*dim})`);
  pg.addColorStop(0.55, `rgba(96,82,78,${0.95*dim})`);
  pg.addColorStop(1, `rgba(58,48,46,${0.92*dim})`);
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(tip.x, tip.y, tr, 0, TAU); ctx.fill();
  const speckleSeed = 12.9898;
  for (let i=0;i<7;i++){
    const ang = (i*2.399) % TAU;
    const rad = tr*0.35 + (Math.sin(i*speckleSeed)*0.5+0.5)*tr*0.55;
    ctx.fillStyle = `rgba(30,24,22,${0.35*dim})`;
    ctx.beginPath();
    ctx.arc(tip.x+Math.cos(ang)*rad, tip.y+Math.sin(ang)*rad, 0.6, 0, TAU);
    ctx.fill();
  }
  ctx.fillStyle = `rgba(255,250,240,${0.55*dim})`;
  ctx.beginPath(); ctx.arc(tip.x-1.3, tip.y-1.3, 1.3, 0, TAU); ctx.fill();
}

let candleFleeState = "idle", candleFleeT = 0, candleFleeX = 0;
function fleeCandleX(){
  const base = W/2;
  if (candleFleeState === "idle") return base;
  const dur = 0.55;
  const p = clamp(candleFleeT/dur, 0, 1);
  const ease = 1 - Math.pow(1-p, 3);
  if (candleFleeState === "running"){
    return base + (candleFleeX - base) * ease;
  }
  if (candleFleeState === "sneaking"){
    return candleFleeX + (base - candleFleeX) * ease;
  }
  return base;
}

function candleFlamePos(){ const cp = candlePos(); return { x: cp.x, y: cp.y - 16 }; }
function drawCandle(t, dim){
  if (candleAlpha <= 0.01) return;
  const cp = candlePos();
  const flicker = 1 + Math.sin(t*23)*0.06 + Math.sin(t*37+1)*0.04;
  const a = candleAlpha;
  const hw = 9, y0 = cp.y-4, y1 = cp.y+42, cx = cp.x;

  ctx.globalCompositeOperation = "source-over";

  // 円柱っぽい陰影（左が影・中央がハイライト・右が影）を横方向グラデーションで表現
  let body = ctx.createLinearGradient(cx-hw,0,cx+hw,0);
  body.addColorStop(0,   `rgba(170,150,120,${0.92*a})`);
  body.addColorStop(0.22,`rgba(232,215,185,${0.95*a})`);
  body.addColorStop(0.55,`rgba(250,240,215,${0.98*a})`);
  body.addColorStop(0.82,`rgba(214,193,158,${0.93*a})`);
  body.addColorStop(1,   `rgba(150,130,100,${0.9*a})`);
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(cx-hw, y0+3);
  ctx.quadraticCurveTo(cx-hw, y0, cx-hw+3, y0);
  ctx.lineTo(cx+hw-3, y0);
  ctx.quadraticCurveTo(cx+hw, y0, cx+hw, y0+3);
  ctx.lineTo(cx+hw, y1);
  ctx.lineTo(cx-hw, y1);
  ctx.closePath();
  ctx.fill();

  // ろうが垂れた跡（非対称な縦筋を数本）
  ctx.fillStyle = `rgba(255,248,232,${0.5*a})`;
  [[-5,10,3],[3,20,2.4],[-1,32,2]].forEach(([dx,len,wd]) => {
    ctx.beginPath();
    ctx.moveTo(cx+dx-wd, y0+4);
    ctx.quadraticCurveTo(cx+dx-wd*1.4, y0+4+len*0.6, cx+dx-wd*0.6, y0+4+len);
    ctx.quadraticCurveTo(cx+dx+wd*0.4, y0+4+len*0.6, cx+dx+wd, y0+4);
    ctx.closePath();
    ctx.fill();
  });

  // 天面のろうだまり（芯のまわりが少しくぼんでいる）
  ctx.fillStyle = `rgba(255,250,238,${0.85*a})`;
  ctx.beginPath(); ctx.ellipse(cx, y0, hw*0.92, 3.4, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = `rgba(150,120,90,${0.35*a})`;
  ctx.beginPath(); ctx.ellipse(cx, y0+0.6, hw*0.32, 1.6, 0, 0, TAU); ctx.fill();

  // 芯（少しカーブして黒ずんでいる）
  ctx.strokeStyle = `rgba(35,25,20,${0.88*a})`;
  ctx.lineWidth = 1.8;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx, y0);
  ctx.quadraticCurveTo(cx+1.2, y0-7, cx-0.6, y0-13);
  ctx.stroke();

  if (candleFleeState === "running" || candleFleeState === "sneaking"){
    const stepPhase = Math.sin(t*26);
    ctx.strokeStyle = `rgba(40,30,25,${0.85*candleAlpha})`;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(cp.x-4, cp.y+42); ctx.lineTo(cp.x-4+stepPhase*6, cp.y+50);
    ctx.moveTo(cp.x+4, cp.y+42); ctx.lineTo(cp.x+4-stepPhase*6, cp.y+50);
    ctx.stroke();
  }

  const fx=cp.x, fy=cp.y-17, r=7*flicker*dim;
  const lean = Math.sin(t*11)*1.6 + Math.sin(t*4.3)*0.8;

  // 外側の環境光（周囲をぼんやり照らす）
  ctx.globalCompositeOperation = "lighter";
  let g = ctx.createRadialGradient(fx,fy,0,fx,fy,r*5);
  g.addColorStop(0, `rgba(255,150,60,${0.18*candleAlpha})`);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(fx,fy,r*5,0,TAU); ctx.fill();

  // 炎本体を涙形（雫形）のパスで描画し、根本は青白く先端はオレンジに抜ける
  const flameH = r*3.1, flameW = r*1.35;
  ctx.save();
  ctx.translate(fx, fy);
  ctx.beginPath();
  ctx.moveTo(0, 1.5);
  ctx.bezierCurveTo(-flameW, -flameH*0.15, -flameW*0.55+lean*0.3, -flameH*0.72, lean, -flameH);
  ctx.bezierCurveTo(flameW*0.55+lean*0.3, -flameH*0.72, flameW, -flameH*0.15, 0, 1.5);
  ctx.closePath();
  let fg = ctx.createLinearGradient(0,1.5,0,-flameH);
  fg.addColorStop(0,    `rgba(90,140,255,${0.55*candleAlpha})`);
  fg.addColorStop(0.28, `rgba(255,235,180,${0.92*candleAlpha})`);
  fg.addColorStop(0.62, `rgba(255,170,70,${0.92*candleAlpha})`);
  fg.addColorStop(1,    `rgba(255,90,30,0)`);
  ctx.fillStyle = fg;
  ctx.fill();
  ctx.restore();

  if (candleExtinguishing){
    const sAge = clamp(extinguishT/1.4, 0, 1);
    ctx.globalCompositeOperation="source-over";
    ctx.strokeStyle = `rgba(200,200,200,${(1-sAge)*0.25})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.quadraticCurveTo(fx+8, fy-20-sAge*20, fx-4, fy-40-sAge*30);
    ctx.stroke();
  }
}
function drawIgniteProgress(progress, tip, flamePos){
  if (progress <= 0 || !tip) return;
  const t = clamp(progress, 0, 1);
  const midx = (tip.x+flamePos.x)/2, midy = (tip.y+flamePos.y)/2;

  ctx.globalCompositeOperation = "lighter";

  ctx.strokeStyle = `rgba(255,170,90,${0.25*t})`;
  ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(flamePos.x, flamePos.y); ctx.lineTo(tip.x, tip.y); ctx.stroke();

  const r = 2 + 5*t;
  let g = ctx.createRadialGradient(midx,midy,0,midx,midy,r*4);
  g.addColorStop(0, `rgba(255,225,170,${0.55*t})`);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(midx,midy,r*4,0,TAU); ctx.fill();
  ctx.fillStyle = `rgba(255,250,235,${0.7*t})`;
  ctx.beginPath(); ctx.arc(midx,midy,r*0.6,0,TAU); ctx.fill();
}
let peakScore=-1, peakCanvas=null, peakCheckCounter=0;
function maybeCapturePeak(phaseKey, surgeLevel){
  if (phaseKey === "tsubomi") return;
  peakCheckCounter = (peakCheckCounter+1) % 4;
  if (peakCheckCounter !== 0) return;
  const score = sparks.length * (1 + surgeLevel*2.2);
  if (score > peakScore){
    peakScore = score;
    if (!peakCanvas){ peakCanvas = document.createElement("canvas"); }
    peakCanvas.width = canvas.width; peakCanvas.height = canvas.height;
    peakCanvas.getContext("2d").drawImage(canvas, 0, 0);
  }
}
function frame(now){
  requestAnimationFrame(frame);
  const t=now/1000;
  const dt=Math.min(0.05, prev?t-prev:0.016);
  prev=t;
  paintNight(0.30);
  const wd=Math.pow(0.12,dt); wind.x*=wd; wind.y*=wd;
  Hand.update(dt);

  debugFrameCount = (debugFrameCount+1) % 6;
  if (debugFrameCount === 0){
    document.getElementById("debug").textContent =
      "ジャイロ: " + Hand.gyroState + " (受信" + Hand.gyroEvents + "回)\n" +
      "β " + (Hand.lastBeta==null?"-":(+Hand.lastBeta).toFixed(1)) +
      "° / γ " + (Hand.lastGamma==null?"-":(+Hand.lastGamma).toFixed(1)) + "°\n" +
      "傾き危険度 " + Hand.tiltMag.toFixed(2) +
      "\nカメラ: " + Hand.camState + (Hand.camReady ? (Hand.camFingers?" / 手検知中":" / 見失い") : "") +
      "\nつまみ危険度 " + Hand.pinchRisk.toFixed(2) +
      "\nぐらつき " + Hand.instability.toFixed(2);
  }

  if (!running){
    updateSparks(dt); drawSparks();
    drawCandle(t, 1);
    if (waitingGrip){
      drawHandInk(1);
      drawUnlitSparkler(1);
      const gripping = (Hand.camReady && Hand.camFingers) || Hand.touches.size >= 2;
      const tip = gripping ? getUnlitTipPos() : null;
      const flamePos = candleFlamePos();
      const dist = tip ? Math.hypot(tip.x-flamePos.x, tip.y-flamePos.y) : Infinity;
      const near = dist < IGNITE_RADIUS;
      const stable = gripping && Hand.pinchRisk < 0.4 && near;
      holdTimer = stable ? holdTimer + dt : Math.max(0, holdTimer - dt*1.4);
      if (tip) drawIgniteProgress(clamp(holdTimer/IGNITE_HOLD, 0, 1), tip, flamePos);
      const waitEl = document.getElementById("waitMsg");
      waitEl.style.opacity = 1;
      waitEl.textContent = (!Hand.camModelReady && Hand.camState.startsWith("手の検知モデルを準備中"))
        ? Hand.camState
        : (!gripping && Hand.camReady && !Hand.touches.size && Hand.lowLightSuspected)
          ? "手元が暗いようです。画面の光で照らしています。手を画面に近づけると検知しやすくなります（タッチ操作も可能です）"
        : !gripping
          ? "画面の線香花火を、指2本（親指・人差し指）でつまんでください"
          : !near
            ? "つまんだまま、下のろうそくの炎に先端を近づけてください"
            : (holdTimer < IGNITE_HOLD
                ? "そのまま近づけて…（あと" + (IGNITE_HOLD-holdTimer).toFixed(1) + "秒）"
                : "火が移りました");
      if (holdTimer >= IGNITE_HOLD){
        waitingGrip = false;
        waitEl.style.opacity = 0;
        candleExtinguishing = true; extinguishT = 0;
        dualActive = Hand.touches.size >= 4;
        if (dualActive) unlockAchievement("twoHands");
        Sound.ignite();
        light();
      }
    }
    return;
  }

  if (!dropped){
    elapsed=t-startT;
    const ph=phaseAt(elapsed);
    if (!ph){ const bp=ballPos(t); dropNow(bp.x,bp.y,"burnout"); return; }

    const {p,local}=ph;
    showPhase(p.name);
    timerEl.textContent=elapsed.toFixed(1)+" 秒";

    if (elapsed > ambientWind.changeAt){
      ambientWind.targetX = rand(-260,260);
      ambientWind.targetY = rand(-30,30);
      ambientWind.changeAt = elapsed + rand(4,9);
    }
    ambientWind.x += (ambientWind.targetX-ambientWind.x)*clamp(dt*0.6,0,1);
    ambientWind.y += (ambientWind.targetY-ambientWind.y)*clamp(dt*0.6,0,1);
    const windStrength = Math.abs(ambientWind.x)/260;
    const counter = clamp(-Hand.gamma * Math.sign(ambientWind.x||1), 0, 1);
    wind.x += ambientWind.x*(1-counter*0.85)*dt;
    wind.y += ambientWind.y*dt*0.4;
    if (windStrength > 0.6 && counter > 0.6){
      windCounterT += dt;
      if (windCounterT > 3) unlockAchievement("windRider");
    } else {
      windCounterT = 0;
    }

    const bp=ballPos(t);

    let boost=1;
    if (p.key==="matsuba"){
      const inSurge = elapsed>=surge.at && elapsed<surge.at+surge.dur;
      surge.level += ((inSurge?1:0)-surge.level)*clamp(4*dt,0,1);
      boost = 1 + surge.level*1.8;
    } else surge.level=0;

    const vulnerable = p.key!=="tsubomi";
    const danger = Hand.instability;
    dangerEl.style.opacity = vulnerable ? (danger*danger*0.9) : 0;
    if (vulnerable && danger>0.55){
      dropRisk += (danger-0.55)*dt*2.6 * (p.key==="chirigiku"?2.2:1);
      if (dropRisk>rand(0.6,1.0)){ dropNow(bp.x,bp.y,"shake"); return; }
    } else {
      dropRisk=Math.max(0,dropRisk-dt*0.5);
    }

    let scale=p.ballR;
    if (p.key==="tsubomi") scale*=0.25+local*0.75;
    if (p.key==="chirigiku") scale*=(1-local*0.45);
    scale *= 1 + surge.level*0.18;
    let dim=1;
    if (p.key==="chirigiku") dim=(0.45+0.35*Math.abs(Math.sin(t*5.2)))*(1-local*0.4);
    dim *= 1 + surge.level*0.25;

    spawnCarry += p.rate*boost*dt;
    while (spawnCarry>=1){ spawnCarry-=1; spawnSpark(bp.x,bp.y,p,0,boost); }
    if (p.key==="botan" && Math.random()<dt*1.2){
      for (let k=0;k<5;k++) spawnSpark(bp.x,bp.y,p,0,1);
      Sound.crackle(true);
    }
    if (surge.level>0.5 && Math.random()<dt*3) Sound.crackle(true);

    const sizzleLevel =
      p.key==="tsubomi" ? 0.25+local*0.3 :
      p.key==="botan"   ? 0.6 :
      p.key==="matsuba" ? 0.8*boost :
      (0.3*(1-local))*dim;
    Sound.sizzle(clamp(sizzleLevel,0,1.6));
    if (Math.random() < p.rate*boost*dt*0.35) Sound.crackle(false);

    updateSparks(dt);
    drawKoyori(bp.x,bp.y,dim);
    drawSparks();
    drawBall(bp.x,bp.y,t,scale,dim);
    if (dualActive){
      const bp2 = ballPos2(t);
      spawnCarry2 += p.rate*boost*dt;
      while (spawnCarry2>=1){ spawnCarry2-=1; spawnSpark(bp2.x,bp2.y,p,0,boost); }
      const a2 = anchor2();
      drawKoyoriFrom(a2.x,a2.y,bp2.x,bp2.y,dim,flexBendX2,flexBendY2);
      drawBall(bp2.x,bp2.y,t,scale,dim);
    }
    maybeCapturePeak(p.key, surge.level);
    drawHandInk(dim);
    if (typeof drawFireflies === "function") drawFireflies(t);
    if (typeof rainbowMode !== "undefined" && rainbowMode && debugFrameCount === 0){
      canvas.style.filter = `hue-rotate(${Math.floor(t*90)%360}deg) saturate(1.3)`;
    }

    if (candleExtinguishing){
      extinguishT += dt;
      candleAlpha = Math.max(0, 1 - extinguishT/0.5);
      drawCandle(t, dim);
      if (candleAlpha <= 0.01) candleExtinguishing = false;
    }

  } else if (dropBall){
    updateSparks(dt);
    drawSparks();
    stepDropBall(dropBall, dt, t);
    stepDropBall(dropBall2, dt, t);
    timerEl.textContent="";
    dangerEl.style.opacity=0;
  }
}
requestAnimationFrame(frame);

function light(){
  sparks.length=0;
  dropped=false; dropBall=null; dropBall2=null; dropCause="";
  shownPhase=""; spawnCarry=0; spawnCarry2=0; dropRisk=0;
  flexT=null; flexPos=null; flexVel={x:0,y:0}; flexBendX=0; flexBendY=0;
  flexT2=null; flexPos2=null; flexVel2={x:0,y:0}; flexBendX2=0; flexBendY2=0;
  ambientWind.x=0; ambientWind.y=0; ambientWind.targetX=0; ambientWind.targetY=0; ambientWind.changeAt=0;
  windCounterT=0;
  if (!dualActive) anchorSmooth2=null;
  Hand.reset();
  rollPhases();
  peakScore = -1; peakCanvas = null;
  document.getElementById("waitMsg").style.opacity=0;
  document.getElementById("achBtn").style.display = "none";
  document.getElementById("achModal").style.display = "none";
  if (typeof applyHueForAttempt === "function") applyHueForAttempt();
  if (typeof firefliesOn !== "undefined"){ firefliesOn = false; fireflies = []; }
  const matsubaStart=PHASES[0].dur+PHASES[1].dur;
  if (typeof mischiefNext !== "undefined" && mischiefNext){
    surge={ at:matsubaStart+PHASES[2].dur*0.12, dur:4.2, level:0 };
    mischiefNext = false;
  } else {
    surge={ at:matsubaStart+PHASES[2].dur*rand(0.3,0.75), dur:2.8, level:0 };
  }
  startT=performance.now()/1000;
  elapsed=0; running=true;
  document.getElementById("ending").classList.remove("show");
  document.getElementById("shareImg").style.display="none";
  Sound.resume();
}

  running = false;
  // フェード演出（数秒）とは別に、押した瞬間にすぐ分かる反応を返す
  const btn = e.currentTarget;
  btn.disabled = true;
  btn.textContent = "支度しています…";
  btn.style.opacity = "0.55";
  const endingEl = document.getElementById("ending");
  endingEl.classList.remove("show");
  let revealed = false;
  const revealWaitingScreen = () => {
    if (revealed) return;
    revealed = true;
    endingEl.removeEventListener("transitionend", onTransitionEnd);
    waitingGrip = true; holdTimer = 0;
    candleAlpha = 1; candleExtinguishing = false; extinguishT = 0;
    try{ Hand.resumeCam && Hand.resumeCam(); }catch(e){}
  };
  const onTransitionEnd = (e) => {
    if (e.target === endingEl && e.propertyName === "opacity") revealWaitingScreen();
  };
  endingEl.addEventListener("transitionend", onTransitionEnd);
  setTimeout(revealWaitingScreen, 3600);
});

function toast(msg, ms){
  const hintEl = document.getElementById("hint");
  if (!hintEl) return;
  const original = hintEl.textContent;
  hintEl.style.transition = "opacity .4s";
  hintEl.textContent = msg;
  hintEl.style.opacity = 1;
  setTimeout(() => {
    hintEl.style.opacity = 0;
    setTimeout(() => { hintEl.textContent = original; hintEl.style.opacity = 1; }, 500);
  }, ms || 1400);
}
function flashFilter(css, ms){
  canvas.style.transition = "filter .6s";
  canvas.style.filter = css;
  if (ms){ setTimeout(() => { canvas.style.filter = ""; }, ms); }
}

function themeFilter(id){
  switch(id){
    case "blue":   return "hue-rotate(200deg) saturate(1.15)";
    case "green":  return "hue-rotate(110deg) saturate(1.15)";
    case "purple": return "hue-rotate(300deg) saturate(1.3)";
    case "sakura": return "hue-rotate(330deg) saturate(1.2)";
    case "silver": return "grayscale(0.55) brightness(1.15) saturate(0.6)";
    default:       return "";
  }
}
function applyCurrentTheme(){
  rainbowMode = (currentTheme === "rainbow");
  if (!rainbowMode) canvas.style.filter = themeFilter(currentTheme);
}

  if (!unlockedThemes.has(id)) return;
  currentTheme = id;
  try{ localStorage.setItem("senko_current_theme", id); }catch(e){}
  applyCurrentTheme();
  renderAchModal();
}

let achToastTimer = null;
function achToast(text){
  clearTimeout(achToastTimer);
  let el = document.getElementById("achToastEl");
  if (!el){
    el = document.createElement("div");
    el.id = "achToastEl";
    el.style.cssText = "position:fixed;top:max(3.6rem,calc(env(safe-area-inset-top) + 2.6rem));left:0;right:0;text-align:center;z-index:15;font-size:.68rem;letter-spacing:.15em;color:rgba(239,230,216,.9);opacity:0;transition:opacity .5s;pointer-events:none;padding:0 1.5rem;";
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.style.opacity = 1;
  achToastTimer = setTimeout(()=>{ el.style.opacity = 0; }, 2200);
}

function unlockAchievement(id){
  if (unlockedAch.has(id)) return;
  unlockedAch.add(id);
  try{ localStorage.setItem("senko_achievements", JSON.stringify([...unlockedAch])); }catch(e){}
  const def = ACHIEVEMENTS.find(a=>a.id===id);
  if (def){
    achToast("実績解除　" + def.title);
    if (def.theme && !unlockedThemes.has(def.theme)){
      unlockedThemes.add(def.theme);
      try{ localStorage.setItem("senko_themes", JSON.stringify([...unlockedThemes])); }catch(e){}
    }
  }
  renderAchModal();
}

function renderAchModal(){
  const listEl = document.getElementById("achList");
  const progEl = document.getElementById("achProgress");
  const themeEl = document.getElementById("themeList");
  if (!listEl) return;
  progEl.textContent = unlockedAch.size + " / " + ACHIEVEMENTS.length + " 解除";
  listEl.innerHTML = ACHIEVEMENTS.map(a => {
    const unlocked = unlockedAch.has(a.id);
    const known = unlocked || a.hintAlways;
    const title = known ? a.title : "？？？";
    const desc = a.desc;
    return `<div style="border:1px solid rgba(239,230,216,${unlocked?0.4:0.15});border-radius:10px;padding:.6rem .9rem;opacity:${unlocked?1:(a.hintAlways?0.75:0.55)};">`
      + `<div style="font-size:.72rem;letter-spacing:.08em;">${unlocked?"解除":"未解除"}　${escapeHtml(title)}</div>`
      + (desc ? `<div style="font-size:.6rem;opacity:.7;margin-top:.25rem;line-height:1.5;">${escapeHtml(desc)}</div>` : "")
      + `</div>`;
  }).join("");
  themeEl.innerHTML = THEMES.map(th => {
    const unlocked = unlockedThemes.has(th.id);
    const active = currentTheme === th.id;
    return `<button data-theme="${th.id}" ${unlocked?"":"disabled"} title="${escapeHtml(th.label)}" style="width:2.7rem;height:2.7rem;border-radius:50%;border:${active?"4px solid #ff9a3c":"4px solid rgba(239,230,216,.65)"};box-shadow:${active?"0 0 0 2px rgba(255,154,60,.35)":"none"};background:${th.swatch};opacity:${unlocked?1:0.22};cursor:${unlocked?"pointer":"not-allowed"};"></button>`;
  }).join("");
}
document.getElementById("achBtn").addEventListener("click", () => {
  renderAchModal();
  document.getElementById("achModal").style.display = "flex";
});
document.getElementById("achCloseBtn").addEventListener("click", () => {
  document.getElementById("achModal").style.display = "none";
});
document.getElementById("themeList").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-theme]");
  if (btn && !btn.disabled) selectTheme(btn.dataset.theme);
});

let mischiefTaps = 0, mischiefLastTap = 0, mischiefNext = false;
document.getElementById("introTitle").addEventListener("click", () => {
  const now = performance.now();
  mischiefTaps = (now - mischiefLastTap < 600) ? mischiefTaps + 1 : 1;
  mischiefLastTap = now;
  if (mischiefTaps >= 5){
    mischiefTaps = 0;
    mischiefNext = true;
    toast("…ウロが、次の一本にいたずらしました");
    unlockAchievement("mischief5");
  }
});

let titleHoldTimer = null;
document.getElementById("introTitle").addEventListener("pointerdown", () => {
  titleHoldTimer = setTimeout(() => {
    nextHueDeg = 200;
    toast("…今夜は、青い火にしてみましょうか");
    unlockAchievement("blueFlame");
  }, 1800);
});
["pointerup","pointerleave","pointercancel"].forEach(ev =>
  document.getElementById("introTitle").addEventListener(ev, () => clearTimeout(titleHoldTimer))
);

let candleTaps = 0, candleLastTap = 0;
canvas.addEventListener("pointerdown", (e) => {
  if (!waitingGrip) return;
  const cp = candlePos();
  const d = Math.hypot(e.clientX-cp.x, e.clientY-cp.y);
  if (d > 50) return;
  const now = performance.now();
  candleTaps = (now - candleLastTap < 500) ? candleTaps + 1 : 1;
  candleLastTap = now;
  if (candleTaps >= 6){
    candleTaps = 0;
    nextHueDeg = 110;
    toast("…ろうそくの火に、いたずらをしました");
    unlockAchievement("greenFlame");
  }
});

let candleFleeHoldTimer = null;
canvas.addEventListener("pointerdown", (e) => {
  if (!waitingGrip || candleFleeState !== "idle") return;
  const cp = candlePos();
  const d = Math.hypot(e.clientX-cp.x, e.clientY-cp.y);
  if (d > 55) return;
  candleFleeHoldTimer = setTimeout(() => {
    candleFleeState = "running";
    candleFleeT = 0;
    candleFleeX = Math.random() < 0.5 ? -40 : W+40;
    Sound.footsteps(6);
    toast("…ろうそくも、たまには逃げたくなるよね", 1400);
    unlockAchievement("candleFlee");
    setTimeout(() => { candleFleeState = "sneaking"; candleFleeT = 0; Sound.footsteps(6); }, 900);
    setTimeout(() => { candleFleeState = "idle"; }, 1500);
  }, 2000);
});
["pointerup","pointerleave","pointercancel"].forEach(ev =>
  canvas.addEventListener(ev, () => clearTimeout(candleFleeHoldTimer))
);

let logTapCount = 0, logLastTap = 0;
document.getElementById("logToggle").addEventListener("dblclick", () => {
  rainbowMode = !rainbowMode;
  if (rainbowMode){
    toast("…火花に、乹をかけました");
    unlockAchievement("rainbowSpark");
  }
});

let phaseTaps = 0, phaseLastTap = 0;
document.getElementById("phaseName").addEventListener("click", () => {
  if (!running || dropped) return;
  const now = performance.now();
  phaseTaps = (now - phaseLastTap < 500) ? phaseTaps + 1 : 1;
  phaseLastTap = now;
  if (phaseTaps >= 7){
    phaseTaps = 0;
    surge.at = elapsed; surge.dur = 3.2;
    toast("…見せ場を、呼んでしまいました", 1000);
    unlockAchievement("stageSteal");
  }
});

let timerTaps = 0, timerLastTap = 0, silentMode = false;
document.getElementById("timer").addEventListener("click", () => {
  const now = performance.now();
  timerTaps = (now - timerLastTap < 500) ? timerTaps + 1 : 1;
  timerLastTap = now;
  if (timerTaps >= 8){
    timerTaps = 0;
    silentMode = !silentMode;
    if (Sound.master) Sound.master.gain.setTargetAtTime(silentMode ? 0.08 : 0.9, Sound.ctx.currentTime, 0.3);
    toast(silentMode ? "…静かな夜にしました" : "…音を戻しました", 1000);
    unlockAchievement("silentNight");
  }
});

let scoreHoldTimer = null;
document.getElementById("finalTime").addEventListener("pointerdown", () => {
  scoreHoldTimer = setTimeout(() => {
    try{ localStorage.setItem("senko_count", "0"); }catch(e){}
    toast("…数えた本数を、なかったことにしました", 1200);
    unlockAchievement("resetCount");
  }, 2000);
});
["pointerup","pointerleave","pointercancel"].forEach(ev =>
  document.getElementById("finalTime").addEventListener(ev, () => clearTimeout(scoreHoldTimer))
);

let shakeCount = 0, shakeLastAt = 0, lastAccelMag = 0;
window.addEventListener("devicemotion", (e) => {
  const a = e.accelerationIncludingGravity;
  if (!a || !waitingGrip) return;
  const mag = Math.hypot(a.x||0, a.y||0, a.z||0);
  if (mag - lastAccelMag > 18){
    const now = performance.now();
    shakeCount = (now - shakeLastAt < 900) ? shakeCount + 1 : 1;
    shakeLastAt = now;
    if (shakeCount >= 3){
      shakeCount = 0;
      wind.x += rand(-800, 800);
      toast("…夜風が、いたずらをしました", 1000);
      unlockAchievement("nightWind");
    }
  }
  lastAccelMag = mag;
});

let twoFingerTapCount = 0, twoFingerLastAt = 0;
let firefliesOn = false, fireflies = [];
canvas.addEventListener("pointerdown", (e) => {
  if (!running || dropped) return;
  if (Hand.touches.size < 2 && e.pointerType === "touch") return;
});
document.addEventListener("touchstart", (e) => {
  if (!running || dropped) return;
  if (e.touches && e.touches.length >= 2){
    const now = performance.now();
    twoFingerTapCount = (now - twoFingerLastAt < 700) ? twoFingerTapCount + 1 : 1;
    twoFingerLastAt = now;
    if (twoFingerTapCount >= 3){
      twoFingerTapCount = 0;
      firefliesOn = true;
      for (let i=0;i<6;i++) fireflies.push({ x:rand(0,W), y:rand(H*0.3,H*0.9), a:rand(0,6.28), s:rand(20,45) });
      toast("…螢を、迷い込ませました", 1000);
      unlockAchievement("fireflies");
    }
  }
});
function drawFireflies(t){
  if (!firefliesOn) return;
  ctx.globalCompositeOperation = "lighter";
  for (const f of fireflies){
    f.a += 0.01;
    f.x += Math.cos(f.a)*0.3; f.y += Math.sin(f.a*1.3)*0.3;
    const flick = 0.4+0.4*Math.abs(Math.sin(t*3+f.s));
    let g = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,10);
    g.addColorStop(0, `rgba(220,255,150,${0.5*flick})`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(f.x,f.y,10,0,TAU); ctx.fill();
  }
}

let uroKeys = [];
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (["u","r","o"].indexOf(k) === -1) { uroKeys = []; return; }
  uroKeys.push(k);
  if (uroKeys.length > 3) uroKeys.shift();
  if (uroKeys.join("") === "uro"){
    uroKeys = [];
    flashFilter("hue-rotate(300deg) saturate(1.4)", 6000);
    toast("…URO、参上");
    unlockAchievement("uroArrive");
  }
});

// キーボードがないスマホでも解除できるよう、「Powered by URO」の長押しでも同じ実績を解除する
(() => {
  const el = document.getElementById("uroCredit");
  if (!el) return;
  let pressTimer = null;
  const start = () => { pressTimer = setTimeout(() => {
    flashFilter("hue-rotate(300deg) saturate(1.4)", 6000);
    toast("…URO、参上");
    unlockAchievement("uroArrive");
  }, 1200); };
  const cancel = () => { clearTimeout(pressTimer); };
  el.addEventListener("touchstart", start, { passive:true });
  el.addEventListener("touchend", cancel);
  el.addEventListener("touchcancel", cancel);
  el.addEventListener("pointerdown", start);
  el.addEventListener("pointerup", cancel);
  el.addEventListener("pointerleave", cancel);
})();

let nextHueDeg = 0, rainbowMode = false;
function applyHueForAttempt(){
  if (nextHueDeg){
    canvas.style.transition = "filter 1s";
    canvas.style.filter = `hue-rotate(${nextHueDeg}deg)`;
    nextHueDeg = 0;
  } else {
    applyCurrentTheme();
  }
}

(function initBaton(){
  const nameInput = document.getElementById("nameInput");
  nameInput.value = getSavedName();
  nameInput.addEventListener("change", () => {
    try{ localStorage.setItem("senko_name", nameInput.value.trim().slice(0,12)); }catch(e){}
  });

  const params = new URLSearchParams(location.search);
  const from = params.get("from");
  const sec = parseFloat(params.get("sec"));
  if (from && !isNaN(sec)){
    const el = document.getElementById("batonMsg");
    el.style.display = "block";
    el.innerHTML = `${escapeHtml(from)} さんから、<br><span style="font-size:1.3em;opacity:.95">${sec.toFixed(1)}秒</span> のバトンが届いています。`;
    document.getElementById("lightBtn").textContent = "灼して、超える";
  }
})();
function escapeHtml(s){
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

applyCurrentTheme();
renderAchModal();
resize();
})();
</script>
